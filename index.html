<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VISION 2035 — 성결대학교 중장기 발전계획</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading -->
<div id="loader">
  <img src="sungkyul_logo.png" alt="성결대학교" onerror="this.style.display='none'">
  <div class="load-bar"><div class="load-fill" id="lFill"></div></div>
  <div class="load-txt" id="lTxt">문서를 불러오는 중... 0%</div>
</div>

<!-- Header -->
<header class="hd">
  <img class="hd-logo" src="sungkyul_logo.png" alt="성결대학교" onerror="this.style.display='none'">
  <div class="hd-div"></div>
  <div class="hd-titles">
    <div class="hd-title">VISION 2035</div>
    <div class="hd-sub">성결대학교 중장기 발전계획</div>
  </div>
  <span class="hd-pg" id="pgInd">— / —</span>
  <div class="tools">
    <button class="tbtn" id="btnSrch" title="검색" onclick="toggleSearch()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
    <button class="tbtn" id="btnThumb" title="미리보기" onclick="toggleThumb()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <div class="zbr">
      <button class="zbtn" onclick="zoomChg(-1)" title="축소">－</button>
      <span id="zLvl">100%</span>
      <button class="zbtn" onclick="zoomChg(1)" title="확대">＋</button>
    </div>
    <button class="tbtn" id="btnShr" title="공유" onclick="toggleShare()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
    </button>
    <a class="pdf-btn" href="vision2035.pdf" download="VISION2035_성결대학교_중장기발전계획.pdf">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>PDF 다운로드</span>
    </a>
  </div>
</header>

<!-- Stage -->
<div class="stage" id="stage">
  <div id="bwrap"><div id="book"></div></div>
</div>

<!-- Controls -->
<footer class="ctrl">
  <button class="nbtn nbtn-p" id="btnPrev" onclick="prevPg()" disabled>← 이전</button>
  <div class="dots" id="dots"></div>
  <button class="nbtn nbtn-n" id="btnNext" onclick="nextPg()" disabled>다음 →</button>
</footer>

<!-- Search panel -->
<div id="srchPanel">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" id="srchInp" placeholder="페이지 번호 입력 (예: 3)..." oninput="doSearch(this.value)" onkeydown="srchKey(event)">
  <span id="srchCnt"></span>
  <button class="snav" onclick="srchNav(-1)">▲</button>
  <button class="snav" onclick="srchNav(1)">▼</button>
  <button class="sclose" onclick="toggleSearch()">✕</button>
</div>

<!-- Thumbnail overlay + drawer -->
<div id="tOverlay" onclick="toggleThumb()"></div>
<div id="tDrawer">
  <div class="thd">
    <span class="thd-ttl">미리보기</span>
    <button class="thd-x" onclick="toggleThumb()">✕</button>
  </div>
  <div id="tList"></div>
</div>

<!-- Share modal -->
<div id="shrModal" onclick="shrBgClick(event)">
  <div class="shbox">
    <div class="shtitle">공유하기</div>
    <div id="qrBox"></div>
    <div class="shurl" id="shrUrl"></div>
    <div class="shacts">
      <button class="shcopy" onclick="copyUrl()">링크 복사</button>
      <button class="shclose" onclick="toggleShare()">닫기</button>
    </div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script src="main.js"></script>
</body>
</html>
